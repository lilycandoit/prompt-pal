<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Prompt Pal</title>
    <link
      rel="stylesheet"
      href="styles/main.css"
    />
  </head>
  <body class="popup-page">
    <div class="popup-header">
      <div class="popup-search-row">
        <input
          type="search"
          id="search"
          class="popup-search"
          placeholder="Search prompts..."
          autocomplete="off"
          spellcheck="false"
        />
        <div class="popup-filter-wrap" id="category-filter-wrap">
          <button
            type="button"
            class="popup-filter"
            id="category-filter-btn"
            aria-haspopup="listbox"
            aria-expanded="false"
            aria-label="Filter by category"
          >
            <span id="category-filter-label">All categories</span>
            <span class="popup-filter-arrow" aria-hidden="true"></span>
          </button>
          <ul
            class="popup-filter-dropdown"
            id="category-filter-list"
            role="listbox"
            hidden
          ></ul>
        </div>
        <button
          type="button"
          id="btn-options"
          class="popup-manage-btn"
          title="Manage prompts"
        >
          ⚙️
        </button>
      </div>
      <div
        id="result-count"
        class="popup-result-count"
        hidden
      ></div>
    </div>

    <div
      id="error-banner"
      class="popup-error"
      hidden
    ></div>

    <ul
      id="prompt-list"
      class="popup-list"
      role="list"
    ></ul>

    <div
      id="empty-msg"
      class="popup-empty"
      hidden
    ></div>

    <script src="popup.js"></script>
  </body>
</html>

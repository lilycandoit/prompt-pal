<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Prompt Pal</title>
    <link
      rel="stylesheet"
      href="styles/main.css"
    />
  </head>
  <body class="popup-page">
    <div class="popup-brand">
      <div class="popup-brand__icon">💡</div>
      <h1 class="popup-brand__title">Prompt Pal</h1>
    </div>

    <div class="popup-header">
      <div class="popup-search-row">
        <input
          type="search"
          id="search"
          class="popup-search"
          placeholder="Search prompts..."
          autocomplete="off"
          spellcheck="false"
        />
        <div class="popup-filter-wrap" id="category-filter-wrap">
          <button
            type="button"
            class="popup-filter"
            id="category-filter-btn"
            aria-haspopup="listbox"
            aria-expanded="false"
            aria-label="Filter by category"
          >
            <span id="category-filter-label">All categories</span>
            <span class="popup-filter-arrow" aria-hidden="true"></span>
          </button>
          <ul
            class="popup-filter-dropdown"
            id="category-filter-list"
            role="listbox"
            hidden
          ></ul>
        </div>
        <button
          type="button"
          id="btn-options"
          class="popup-manage-btn"
          title="Manage prompts"
        >
          ⚙️
        </button>
      </div>
      <div
        id="result-count"
        class="popup-result-count"
        hidden
      ></div>
    </div>

    <div
      id="error-banner"
      class="popup-error"
      hidden
    ></div>

    <ul
      id="prompt-list"
      class="popup-list"
      role="list"
    ></ul>

    <div
      id="empty-msg"
      class="popup-empty"
      hidden
    ></div>

    <div id="preview-modal" class="popup-modal" hidden>
      <div class="popup-modal__content">
        <div class="popup-modal__header">
          <h2 id="preview-modal-title" class="popup-modal__title"></h2>
          <button type="button" id="preview-modal-close" class="popup-modal__close" title="Close" aria-label="Close preview">
            ✕
          </button>
        </div>
        <div id="preview-modal-body" class="popup-modal__body"></div>
        <div class="popup-modal__footer">
          <button type="button" id="preview-modal-back" class="popup-modal__btn popup-modal__btn--secondary">
            Back
          </button>
          <button type="button" id="preview-modal-inject" class="popup-modal__btn popup-modal__btn--primary">
            Inject
          </button>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Pal — Options</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div class="options-page">
    <h1 class="options-title">Prompt Pal — Options</h1>

    <div class="panels">
      <!-- Left panel: prompt list -->
      <aside class="panel-list">
        <button type="button" class="btn btn--new" id="btn-new">+ New</button>
        <ul class="prompt-list" id="prompt-list" role="list">
          <!-- Populated by options.js -->
        </ul>
      </aside>

      <!-- Right panel: create / edit form -->
      <main class="panel-form">
        <h2 class="panel-heading" id="form-heading">New Prompt</h2>

        <!-- Empty state (shown when no prompt is selected and list is empty) -->
        <div class="empty-state" id="empty-state" hidden>
          <p class="empty-state__heading">No prompts yet</p>
          <p class="empty-state__body">Click &ldquo;+ New&rdquo; to create your first prompt.</p>
        </div>

        <form id="prompt-form" novalidate>
          <div class="form-group">
            <label for="field-title">Title</label>
            <input
              type="text"
              id="field-title"
              name="title"
              placeholder="Short, memorable name"
              autocomplete="off"
            >
          </div>

          <div class="form-group">
            <label for="field-category">Category</label>
            <input
              type="text"
              id="field-category"
              name="category"
              placeholder="e.g. Coding, Writing, Explaining"
              autocomplete="off"
            >
          </div>

          <div class="form-group">
            <label for="field-body">Prompt</label>
            <textarea
              id="field-body"
              name="body"
              placeholder="Write your prompt here..."
            ></textarea>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn--primary" id="btn-save">Save Prompt</button>
            <button type="button" class="btn btn--secondary" id="btn-delete" hidden>Delete</button>
          </div>
        </form>
      </main>
    </div>
  </div>

  <script src="utils/frontmatter.js"></script>
  <script src="options.js"></script>
</body>
</html>
